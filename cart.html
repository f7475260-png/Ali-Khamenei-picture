<section class="container">
    <h2>Votre Panier</h2>
    <table>
        <thead>
            <tr>
                <th>Produit</th>
                <th>Quantité</th>
                <th>Prix</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="cart-table"></tbody>
    </table>
    <div style="text-align: right; margin-top: 20px;">
        <h3>Total: <span id="cart-total">0</span> €</h3>
        <button class="btn-add" onclick="goToCheckout()" style="width: auto; padding: 10px 40px;">Passer à la commande</button>
    </div>
</section>
