<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Paiement Sécurisé | ICONOGRAPHIE</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container checkout-container">
        <div class="card-visual">
            <div class="card-inner">
                <div class="card-front">
                    <div class="card-chip"></div>
                    <div class="card-number-display" id="display-number">#### #### #### ####</div>
                    <div class="card-details">
                        <div>
                            <small>Titulaire</small>
                            <div id="display-name">NOM COMPLET</div>
                        </div>
                        <div>
                            <small>Expire</small>
                            <div id="display-expiry">MM/YY</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <form id="payment-form" onsubmit="processPayment(event)" class="glass-form">
            <h2>Détails du Paiement</h2>
            <div class="input-group">
                <label>Nom du titulaire</label>
                <input type="text" id="card-name" placeholder="JEAN DUPONT" required autocomplete="off">
            </div>
            <div class="input-group">
                <label>Numéro de carte</label>
                <input type="text" id="card-number" placeholder="4242 4242 4242 4242" maxlength="19" required>
            </div>
            <div class="input-row">
                <div class="input-group">
                    <label>Date d'expiration</label>
                    <input type="text" id="card-expiry" placeholder="MM/YY" maxlength="5" required>
                </div>
                <div class="input-group">
                    <label>CVC</label>
                    <input type="password" id="card-cvc" placeholder="***" maxlength="3" required>
                </div>
            </div>
            <button type="submit" class="btn-main" id="pay-button">Confirmer le paiement</button>
        </form>
    </div>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script src="app.js"></script>
</body>
</html>
